<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: white;">
<style>
  .node-hw { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.8; }
  .node-sw { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.8; }
  .node-constraint { fill: #FAECE7; stroke: #993C1D; stroke-width: 1.2; }
  .node-neutral { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.8; }
  .node-answer { fill: none; stroke: #993C1D; stroke-width: 1.2; }
  .title { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .label { font-size: 12px; fill: #444441; }
  .side { font-size: 11px; fill: #888780; font-weight: 500; letter-spacing: 1px; }
  .answer-text { font-size: 13px; font-weight: 500; fill: #993C1D; }
  .caption { font-size: 11px; fill: #888780; }
  .arr { stroke: #5F5E5A; stroke-width: 1; fill: none; }
  marker path { fill: none; stroke: #5F5E5A; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9"/>
  </marker>
</defs>
<text class="title" x="340" y="24" text-anchor="middle">Boucle de création de demande — industrie des semiconducteurs</text>
<rect class="node-constraint" x="165" y="44" width="350" height="48" rx="10"/>
<text class="title" x="340" y="64" text-anchor="middle" dominant-baseline="central">La puissance de calcul mise sur le marché</text>
<text class="title" x="340" y="80" text-anchor="middle" dominant-baseline="central">doit être consommée</text>
<path class="arr" d="M210 92 L130 126" marker-end="url(#arrow)"/>
<path class="arr" d="M470 92 L550 126" marker-end="url(#arrow)"/>
<text class="side" x="130" y="120" text-anchor="middle">HARDWARE</text>
<rect class="node-hw" x="20" y="130" width="220" height="48" rx="10"/>
<text class="label" x="130" y="150" text-anchor="middle" dominant-baseline="central">Les composants intègrent toujours</text>
<text class="label" x="130" y="166" text-anchor="middle" dominant-baseline="central">plus de capacité (loi de Moore)</text>
<path class="arr" d="M130 178 L130 206" marker-end="url(#arrow)"/>
<rect class="node-hw" x="20" y="208" width="220" height="48" rx="10"/>
<text class="label" x="130" y="228" text-anchor="middle" dominant-baseline="central">Construire de nouvelles fonderies</text>
<text class="label" x="130" y="244" text-anchor="middle" dominant-baseline="central">coût ×2 tous les 4 ans (loi de Rock)</text>
<path class="arr" d="M130 256 L130 284" marker-end="url(#arrow)"/>
<rect class="node-hw" x="20" y="286" width="220" height="48" rx="10"/>
<text class="label" x="130" y="306" text-anchor="middle" dominant-baseline="central">Vendre plus de composants</text>
<text class="label" x="130" y="322" text-anchor="middle" dominant-baseline="central">pour financer la génération suivante</text>
<text class="side" x="550" y="120" text-anchor="middle">SOFTWARE</text>
<rect class="node-sw" x="440" y="130" width="220" height="48" rx="10"/>
<text class="label" x="550" y="150" text-anchor="middle" dominant-baseline="central">Les logiciels consomment toujours</text>
<text class="label" x="550" y="166" text-anchor="middle" dominant-baseline="central">plus de puissance de calcul</text>
<path class="arr" d="M550 178 L550 206" marker-end="url(#arrow)"/>
<rect class="node-sw" x="440" y="208" width="220" height="48" rx="10"/>
<text class="title" x="550" y="228" text-anchor="middle" dominant-baseline="central">Pas de coût marginal</text>
<text class="label" x="550" y="244" text-anchor="middle" dominant-baseline="central">pour l'éditeur logiciel</text>
<path class="arr" d="M550 256 L550 284" marker-end="url(#arrow)"/>
<rect class="node-sw" x="440" y="286" width="220" height="48" rx="10"/>
<text class="label" x="550" y="306" text-anchor="middle" dominant-baseline="central">Nouvelles fonctionnalités</text>
<text class="label" x="550" y="322" text-anchor="middle" dominant-baseline="central">moindre optimisation du code</text>
<path class="arr" d="M190 334 L270 386" marker-end="url(#arrow)"/>
<path class="arr" d="M490 334 L410 386" marker-end="url(#arrow)"/>
<rect class="node-neutral" x="215" y="388" width="250" height="48" rx="10"/>
<text class="label" x="340" y="408" text-anchor="middle" dominant-baseline="central">Baisse du coût des composants</text>
<text class="label" x="340" y="424" text-anchor="middle" dominant-baseline="central">→ nouveaux utilisateurs</text>
<path class="arr" d="M340 436 L340 464 L10 464 L10 68 L163 68" marker-end="url(#arrow)"/>
<rect class="node-answer" x="175" y="490" width="330" height="36" rx="8"/>
<text class="answer-text" x="340" y="512" text-anchor="middle" dominant-baseline="central">Réponse : création endogène de demande</text>
<text class="caption" x="340" y="552" text-anchor="middle">Condition de bouclage : le coût marginal nul côté logiciel</text>
<text class="caption" x="340" y="568" text-anchor="middle">Sources : Moore 1965, Rock / Ross 1995, Gruber 1996, Gilder 1995</text>
</svg>